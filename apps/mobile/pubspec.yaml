name: rafeeq_mobile
description: Arabic-first caregiver and doctor client for RAFEEQ.
publish_to: none
version: 0.1.0+1
environment:
  sdk: '>=3.5.0 <4.0.0'
dependencies:
  flutter: {sdk: flutter}
  flutter_localizations: {sdk: flutter}
  camera: ^0.12.0+1
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  js: ^0.6.7
  web: ^1.1.1
  web_socket_channel: ^3.0.2
  flutter_secure_storage: ^9.2.2
dev_dependencies:
  flutter_test: {sdk: flutter}
  flutter_lints: ^5.0.0
flutter:
  uses-material-design: true
  generate: true
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
    - family: RafeeqNaskh
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
  assets:
    - assets/images/rafeeq_logo.jpg
    - assets/images/rafeeq_robot.png
