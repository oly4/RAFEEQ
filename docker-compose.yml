services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rafeeq
      POSTGRES_USER: rafeeq
      POSTGRES_PASSWORD: rafeeq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rafeeq"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  mosquitto:
    image: eclipse-mosquitto:2
    ports: ["1883:1883"]
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
  backend:
    build: ./services/backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://rafeeq:rafeeq@postgres:5432/rafeeq
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      mosquitto: {condition: service_started}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:
